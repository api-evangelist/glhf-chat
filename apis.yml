aid: glhf-chat
url: https://raw.githubusercontent.com/api-evangelist/glhf-chat/refs/heads/main/apis.yml
name: glhf
kind: company
description: glhf (glhf.chat) runs almost any open-source large language model on demand
  through an auto-scaling GPU scheduler built on vLLM. Any Hugging Face repository can
  be served by passing its identifier as hf:org/model to an OpenAI-compatible REST
  API, giving access to models like Llama, Qwen, and Mixtral without self-hosting.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- LLM
- Inference
- Open Source Models
- Hugging Face
